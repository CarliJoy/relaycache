[project]
name = "relaycache-tests"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pytest>=8",
]

[dependency-groups]
dev = [
    "mypy>=1.10",
    "ruff>=0.15.15",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN"]
ignore = [
    "ANN101",  # missing type for self
    "ANN102",  # missing type for cls
    "ANN401",  # Any is legitimate for *args/**kwargs forwarding
]

[tool.mypy]
python_version = "3.10"
strict = true
