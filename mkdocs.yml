site_name: Relaycache
site_description: Always-revalidating HTTP proxy with content-addressed disk cache
repo_url: https://github.com/yourorg/relaycache
docs_dir: docs

nav:
  - Home: index.md
  - Design:
    - Overview: design/overview.md
    - Caching Model: design/caching-model.md
    - Validator Merging: design/validator-merging.md
    - Range Requests: design/range-requests.md
    - Vary Header: design/vary.md
    - Persistent Storage: design/storage.md
  - Configuration: configuration.md
  - Docker Registry: docker-registry.md

theme:
  name: material
  palette:
    primary: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - tables
